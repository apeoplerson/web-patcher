<!doctype html>
<html>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <head>
        <title>OWTK Patcher</title>

        <link data-trunk rel="rust" data-wasm-opt="2" />
        <!-- this is the base url relative to which other urls will be constructed. trunk will insert this from the public-url option -->
        <base data-trunk-public-url />

        <link data-trunk rel="icon" href="assets/icons/favicon.ico" />

        <link data-trunk rel="copy-file" href="assets/_headers" />
        <link data-trunk rel="copy-file" href="assets/sw.js" />
        <link data-trunk rel="copy-file" href="assets/manifest.json" />
        <link data-trunk rel="copy-file" href="assets/notifications.json" />
        <link
            data-trunk
            rel="copy-file"
            href="assets/fonts/JetBrainsMono-Regular.ttf"
            data-target-path="assets/fonts"
        />
        <link
            data-trunk
            rel="copy-file"
            href="assets/icons/icon-1024.png"
            data-target-path="assets/icons"
        />
        <link
            data-trunk
            rel="copy-file"
            href="assets/icons/icon-256.png"
            data-target-path="assets/icons"
        />
        <link
            data-trunk
            rel="copy-file"
            href="assets/icons/icon_ios_touch_192.png"
            data-target-path="assets/icons"
        />
        <link
            data-trunk
            rel="copy-file"
            href="assets/icons/maskable_icon_x512.png"
            data-target-path="assets/icons"
        />

        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="assets/icons/icon_ios_touch_192.png" />
        <meta
            name="theme-color"
            media="(prefers-color-scheme: light)"
            content="white"
        />
        <meta
            name="theme-color"
            media="(prefers-color-scheme: dark)"
            content="#404040"
        />

        <style>
            @font-face {
                font-family: "JetBrains Mono";
                src: url("assets/fonts/JetBrainsMono-Regular.ttf")
                    format("truetype");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }

            html {
                /* Remove touch delay: */
                touch-action: manipulation;
                font-family: "JetBrains Mono", monospace;
            }

            body {
                /* Light mode background color for what is not covered by the egui canvas,
            or where the egui canvas is translucent. */
                background: #909090;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    /* Dark mode background color for what is not covered by the egui canvas,
                or where the egui canvas is translucent. */
                    background: #404040;
                }
            }

            /* Allow canvas to fill entire web page: */
            html,
            body {
                overflow: hidden;
                margin: 0 !important;
                padding: 0 !important;
                height: 100%;
                width: 100%;
            }

            /* Make canvas fill entire document: */
            canvas {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .centered {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #e0e0e0;
                font-family: inherit;
                text-align: center;
                animation: fade-in 0.4s ease-out;
            }

            @keyframes fade-in {
                from {
                    opacity: 0;
                    transform: translate(-50%, -45%);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
            }

            .loading-title {
                font-size: 28px;
                font-weight: 600;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }

            .loading-subtitle {
                font-size: 14px;
                color: #a0a0a0;
                margin-bottom: 24px;
            }

            .spinner {
                display: inline-block;
                width: 32px;
                height: 32px;
                border: 3px solid rgba(255, 255, 255, 0.15);
                border-top-color: #e0e0e0;
                border-radius: 50%;
                animation: spin 0.8s ease-in-out infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* ── Notification toast ────────────────────────── */
            .notification-toast {
                position: fixed;
                top: 12px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10000;
                max-width: 380px;
                width: calc(100% - 32px);
                padding: 12px 14px;
                background: #323232;
                color: #e0e0e0;
                border-radius: 6px;
                box-shadow: 1px 2px 8px 2px rgba(0, 0, 0, 0.24);
                font-family: inherit;
                font-size: 14px;
                animation: slide-down 0.3s ease-out;
            }

            .notification-toast-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }

            .notification-toast-message {
                flex: 1;
            }

            .notification-toast-changelog {
                margin: 8px 0 0;
                padding: 0 0 0 18px;
                font-size: 13px;
                color: #b0b0b0;
            }

            .notification-toast-changelog li {
                margin-bottom: 2px;
            }

            .notification-toast-dismiss {
                background: none;
                border: none;
                color: #888;
                font-size: 18px;
                cursor: pointer;
                padding: 0 4px;
                line-height: 1;
                flex-shrink: 0;
                align-self: flex-start;
            }

            .notification-toast-dismiss:hover {
                color: #ccc;
            }

            @keyframes slide-down {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }

            .notification-toast.slide-out {
                animation: slide-up 0.3s ease-in forwards;
            }

            @keyframes slide-up {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        </style>
    </head>

    <body>
        <!-- The WASM code will resize the canvas dynamically -->
        <!-- the id is hardcoded in main.rs . so, make sure both match. -->
        <canvas id="the_canvas_id"></canvas>

        <!-- the loading spinner will be removed in main.rs -->
        <div class="centered" id="loading_text">
            <noscript>You need javascript to use this website</noscript>
            <div class="loading-title">OWTK Patcher</div>
            <div class="loading-subtitle">Loading&hellip;</div>
            <div class="spinner"></div>
        </div>

        <!--Register Service Worker. this will cache the wasm / js scripts for offline use (for PWA functionality). -->
        <!-- Force refresh (Ctrl + F5) to load the latest files instead of cached files  -->
        <script>
            // We disable caching during development so that we always view the latest version.
            if (
                "serviceWorker" in navigator &&
                window.location.hash !== "#dev"
            ) {
                window.addEventListener("load", async function () {
                    const reg = await navigator.serviceWorker.register("sw.js");

                    // First-ever install: no existing controller means
                    // this is a brand new visit, not an update.
                    if (!navigator.serviceWorker.controller && reg.installing) {
                        const sw = reg.installing;
                        sw.addEventListener("statechange", () => {
                            if (sw.state === "activated") {
                                showNotification(
                                    {
                                        id: "__cached",
                                        message:
                                            "OWTK Patcher has been cached and is ready for offline use.",
                                    },
                                    checkNotifications,
                                );
                            }
                        });
                    } else {
                        checkNotifications();
                    }
                });
            }

            // ── Notifications ────────────────────────────────
            const DISMISSED_KEY = "owtk-dismissed-notifications";

            function getDismissed() {
                try {
                    return JSON.parse(localStorage.getItem(DISMISSED_KEY)) || [];
                } catch {
                    return [];
                }
            }

            function dismiss(id) {
                const list = getDismissed();
                if (!list.includes(id)) {
                    list.push(id);
                    localStorage.setItem(DISMISSED_KEY, JSON.stringify(list));
                }
            }

            function showNotification(n, onDismiss) {
                const toast = document.createElement("div");
                toast.className = "notification-toast";
                toast.setAttribute("role", "alert");

                let html =
                    '<div class="notification-toast-header">' +
                    '<span class="notification-toast-message"></span>' +
                    '<button class="notification-toast-dismiss" aria-label="Dismiss">\u00D7</button>' +
                    "</div>";

                if (n.changelog && n.changelog.length) {
                    html += '<ul class="notification-toast-changelog">';
                    for (const item of n.changelog) {
                        html +=
                            "<li>" +
                            item.replace(/&/g, "&amp;").replace(/</g, "&lt;") +
                            "</li>";
                    }
                    html += "</ul>";
                }

                toast.innerHTML = html;
                toast.querySelector(".notification-toast-message").textContent =
                    n.message;

                function dismissToast() {
                    if (toast.classList.contains("slide-out")) return;
                    dismiss(n.id);
                    toast.classList.add("slide-out");
                    toast.addEventListener("animationend", () => {
                        toast.remove();
                        if (onDismiss) onDismiss();
                    });
                }

                toast
                    .querySelector(".notification-toast-dismiss")
                    .addEventListener("click", dismissToast);

                document.body.appendChild(toast);

                setTimeout(dismissToast, 3000);
            }

            async function checkNotifications() {
                try {
                    const res = await fetch("notifications.json");
                    if (!res.ok) return;
                    const notifications = await res.json();
                    const dismissed = getDismissed();

                    // Only show the latest notification
                    const latest = notifications[notifications.length - 1];
                    if (latest && !dismissed.includes(latest.id)) {
                        showNotification(latest);
                    }
                } catch {
                    // offline or missing — silently ignore
                }
            }

        </script>
    </body>
</html>
